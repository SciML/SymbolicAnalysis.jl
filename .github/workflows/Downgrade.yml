name: Downgrade
on:
  pull_request:
    branches:
      - main
    paths-ignore:
      - 'docs/**'
  push:
    branches:
      - main
    paths-ignore:
      - 'docs/**'
jobs:
  downgrade-core:
    uses: "SciML/.github/.github/workflows/downgrade.yml@v1"
    with:
      julia-version: "lts"
      group: "Core"
      projects: ".,test"
    secrets: "inherit"

  # Core and DGP intentionally resolve different LogExpFunctions generations.
  # Separate Julia processes prevent extensions from binding to a version loaded
  # by the other environment.
  downgrade-dgp:
    uses: "SciML/.github/.github/workflows/downgrade.yml@v1"
    with:
      julia-version: "lts"
      group: "DGP"
      projects: "test/DGP"
    secrets: "inherit"
